name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build Binaries
        run: |
          # Get version from tag (e.g. v1.0.0 -> 1.0.0)
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          
          # Target platforms
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          
          mkdir -p dist
          
          for PLATFORM in "${PLATFORMS[@]}"; do
            OS=$(echo $PLATFORM | cut -d'/' -f1)
            ARCH=$(echo $PLATFORM | cut -d'/' -f2)
            
            BINARY_NAME="terraform-provider-cockpit_v${VERSION}"
            if [ "$OS" = "windows" ]; then
              BINARY_NAME="${BINARY_NAME}.exe"
            fi
            
            ZIP_NAME="terraform-provider-cockpit_${VERSION}_${OS}_${ARCH}.zip"
            
            echo "Building for $OS/$ARCH..."
            GOOS=$OS GOARCH=$ARCH CGO_ENABLED=0 go build -ldflags="-s -w" -o "dist/$BINARY_NAME" main.go
            
            # Package as ZIP (Terraform Registry requires ZIP for all platforms)
            cd dist
            zip "$ZIP_NAME" "$BINARY_NAME"
            rm "$BINARY_NAME"
            cd ..
          done

      - name: Calculate Checksums
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          cd dist
          sha256sum *.zip > "terraform-provider-cockpit_${VERSION}_SHA256SUMS"

      - name: Sign Checksums
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          cd dist
          gpg --batch --yes --armor --detach-sign --output "terraform-provider-cockpit_${VERSION}_SHA256SUMS.sig" "terraform-provider-cockpit_${VERSION}_SHA256SUMS"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*_SHA256SUMS
            dist/*_SHA256SUMS.sig
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
